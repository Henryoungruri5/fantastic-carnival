name: Encode Video

on:
  workflow_dispatch:
    inputs:
      video_msg_id:
        description: "Video Message ID"
        required: true
      sub_msg_id:
        description: "Subtitle Message ID"
        required: false
      settings:
        description: "Encoding settings JSON"
        required: true
      chat_id:
        description: "Telegram chat_id"
        required: true
      task_id:
        description: "Task ID"
        required: true
      bot_token:
        description: "Bot Token"
        required: true
      api_id:
        description: "API ID"
        required: true
      api_hash:
        description: "API HASH"
        required: true
      status_msg_id:
        description: "Status Message ID"
        required: false

jobs:
  encode:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Install FFmpeg & Python
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install pyrogram tgcrypto pyaes nest_asyncio

      - name: Encode via Pyrogram Worker
        run: |
          cat << 'EOF' > worker.py
          import asyncio, json, os, subprocess, time
          import nest_asyncio
          from pyrogram import Client

          nest_asyncio.apply()

          def format_size(b):
              for u in ('B','KB','MB','GB'):
                  if b < 1024: return f"{b:.1f} {u}"
                  b /= 1024
              return f"{b:.1f} TB"

          def make_prog(app, chat_id, msg_id, label, fname):
              last_t = time.time()
              start_t = time.time()
              async def cb(current, total):
                  nonlocal last_t
                  now = time.time()
                  if total and (now - last_t < 2.0) and current < total: return
                  last_t = now
                  elap = now - start_t
                  pct = (current / total * 100) if total else 0
                  bar_len = 12
                  filled = int(bar_len * current / total) if total else 0
                  bar = "█" * filled + "░" * (bar_len - filled)
                  spd = format_size(current/elap) + "/s" if elap > 0 else "-"
                  try:
                      await app.edit_message_text(chat_id, msg_id, f"🐙 **GitHub Worker**\n{label} `{fname}`\n`{bar}` {pct:.1f}%\n⚡ {spd}")
                  except: pass
              return cb

          async def main():
              app = Client("gh_session", api_id=int("${{ inputs.api_id }}"), api_hash="${{ inputs.api_hash }}", bot_token="${{ inputs.bot_token }}")
              await app.start()
              
              chat_id = int("${{ inputs.chat_id }}")
              v_id = int("${{ inputs.video_msg_id }}")
              s_id = "${{ inputs.sub_msg_id }}"
              msg_id = int("${{ inputs.status_msg_id }}") if "${{ inputs.status_msg_id }}" else 0
              settings = json.loads('${{ inputs.settings }}')
              out_name = settings.get("output", "output.mkv")
              
              if msg_id: await app.edit_message_text(chat_id, msg_id, f"🐙 **GitHub Worker**\n⬇️ Downloading Video...")
              v_msg = await app.get_messages(chat_id, v_id)
              v_path = await app.download_media(v_msg, file_name="input.mp4", progress=make_prog(app, chat_id, msg_id, "⬇️ Downloading", "video") if msg_id else None)
              
              s_path = None
              if s_id:
                  if msg_id: await app.edit_message_text(chat_id, msg_id, f"🐙 **GitHub Worker**\n⬇️ Downloading Subtitle...")
                  s_msg = await app.get_messages(chat_id, int(s_id))
                  ext = ".srt"
                  if getattr(s_msg.document, "file_name", ""):
                      if s_msg.document.file_name.endswith(".ass"): ext = ".ass"
                      elif s_msg.document.file_name.endswith(".vtt"): ext = ".vtt"
                  s_path = await app.download_media(s_msg, file_name=f"sub{ext}", progress=make_prog(app, chat_id, msg_id, "⬇️ Downloading", "subtitle") if msg_id else None)
              
              vf = []
              res = settings.get("res", "original")
              if res != "original":
                  rmap = {"1080p":"1920:1080", "720p":"1280:720", "480p":"854:480"}
                  vf.append(f"scale={rmap.get(res, res)}")
              
              if s_path:
                  esc_sub = s_path.replace("\\", "/").replace("'", r"'''").replace(":", r"\:")
                  vf.append(f"subtitles='{esc_sub}'")
              
              cmd = ['ffmpeg', '-y', '-i', v_path]
              if vf:
                  cmd += ['-vf', ",".join(vf)]
              
              crf = str(settings.get("quality", "23"))
              preset = settings.get("preset", "fast")
              cmd += ['-map', '0:v:0', '-map', '0:a:0?', '-c:v', 'libx264', '-preset', preset, '-crf', crf, '-c:a', 'copy', out_name]
              
              if msg_id: await app.edit_message_text(chat_id, msg_id, f"🐙 **GitHub Worker**\n⚙️ Encoding Video...\n(Logs Action Tab mein check karein)")
              res = subprocess.run(cmd, capture_output=True)
              
              if res.returncode != 0 or not os.path.exists(out_name):
                  err_msg = res.stderr.decode()[-500:] if res.stderr else "Unknown FFmpeg error"
                  if msg_id: await app.edit_message_text(chat_id, msg_id, f"❌ **GitHub Encoding Failed!**\n```\n{err_msg}\n```")
                  await app.stop()
                  return

              if msg_id: await app.edit_message_text(chat_id, msg_id, f"🐙 **GitHub Worker**\n☁️ Uploading `{out_name}`...")
              await app.send_document(chat_id, out_name, caption=f"✅ GitHub Action Complete!\n📁 `{out_name}`", file_name=out_name, progress=make_prog(app, chat_id, msg_id, "☁️ Uploading", out_name) if msg_id else None)
              
              if msg_id: await app.delete_messages(chat_id, msg_id)
              await app.stop()

          asyncio.run(main())
          EOF
          python worker.py
