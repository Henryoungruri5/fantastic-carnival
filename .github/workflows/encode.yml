name: Encode Video

on:
  workflow_dispatch:
    inputs:
      video_msg_id: { required: true }
      sub_msg_id: { required: false }
      settings: { required: true }
      chat_id: { required: true }
      task_id: { required: true }
      bot_token: { required: true }
      api_id: { required: true }
      api_hash: { required: true }
      status_msg_id: { required: false }
      mode: { required: true }
      font_file_id: { required: false }

jobs:
  encode:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Install FFmpeg & Python
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fontconfig
          pip install pyrogram tgcrypto pyaes nest_asyncio

      - name: Encode via Pyrogram Worker
        env:
          INPUT_SETTINGS: ${{ inputs.settings }}
        run: |
          cat << 'EOF' > worker.py
          import asyncio, json, os, subprocess, time, re
          import nest_asyncio
          from pyrogram import Client

          nest_asyncio.apply()

          def make_prog(app, chat_id, msg_id, label, fname, mode, task_id):
              last_t = time.time()
              async def cb(current, total):
                  nonlocal last_t
                  now = time.time()
                  if total and (now - last_t < 2.5) and current < total: return
                  last_t = now
                  pct = (current / total * 100) if total else 0
                  try:
                      await app.edit_message_text(chat_id, msg_id, f"File name:- **{fname}**\n{label.capitalize()} :- loading {pct:.1f}%\nMode:- {mode}\nFile id :- `{task_id}`")
                  except: pass
              return cb

          async def prep_subtitle(s_path: str, font_setting: str) -> str:
              if not s_path or not os.path.exists(s_path): return s_path
              
              real_font_name = font_setting
              base, ext = os.path.splitext(s_path)
              ass_path = base + ".ass"
              
              if ext.lower() in ['.srt', '.vtt']:
                  subprocess.run(['ffmpeg', '-y', '-i', s_path, ass_path], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                  if not os.path.exists(ass_path): return s_path
              elif ext.lower() == '.ass':
                  ass_path = s_path
              else: return s_path
                  
              try:
                  with open(ass_path, 'r', encoding='utf-8-sig', errors='ignore') as f: lines = f.readlines()
                  new_lines = []
                  for line in lines:
                      if line.strip().startswith("Style:"):
                          parts = line.split(",")
                          if len(parts) > 2:
                              parts[1] = real_font_name 
                              line = ",".join(parts)
                      new_lines.append(line)
                  mod_path = base + "_mod.ass"
                  with open(mod_path, 'w', encoding='utf-8') as f: f.writelines(new_lines)
                  return mod_path
              except Exception: return ass_path

          async def main():
              app = Client("gh_session", api_id=int("${{ inputs.api_id }}"), api_hash="${{ inputs.api_hash }}", bot_token="${{ inputs.bot_token }}")
              await app.start()
              
              chat_id = int("${{ inputs.chat_id }}")
              v_id = int("${{ inputs.video_msg_id }}")
              s_id = "${{ inputs.sub_msg_id }}"
              msg_id = int("${{ inputs.status_msg_id }}") if "${{ inputs.status_msg_id }}" else 0
              task_id = "${{ inputs.task_id }}"
              mode = "${{ inputs.mode }}"
              font_file_id = "${{ inputs.font_file_id }}"
              
              # Use OS Environment variable to bypass quotes breaking python string literal
              settings = json.loads(os.environ.get('INPUT_SETTINGS', '{}'))
              out_name = settings.get("output", "output.mkv")
              
              if font_file_id:
                  if msg_id: await app.edit_message_text(chat_id, msg_id, f"File name:- **{out_name}**\nDownloading Font...\nMode:- {mode}\nFile id :- `{task_id}`")
                  f_path = await app.download_media(font_file_id, file_name="fonts/custom_font.ttf")
                  if f_path:
                      os.makedirs(os.path.expanduser("~/.fonts"), exist_ok=True)
                      os.system(f"cp '{f_path}' ~/.fonts/ && fc-cache -f -v 2>/dev/null")
                      try:
                          proc = subprocess.run(['fc-scan', '-f', '%{family}', f_path], capture_output=True, text=True)
                          out_str = proc.stdout.strip()
                          if out_str:
                              settings['font'] = out_str.split(',')[0].strip()
                      except: pass
              
              v_msg = await app.get_messages(chat_id, v_id)
              v_path = await app.download_media(v_msg, file_name="input.mp4", progress=make_prog(app, chat_id, msg_id, "Downloading", out_name, mode, task_id) if msg_id else None)
              
              if mode == 'extractsubs':
                  if msg_id: await app.edit_message_text(chat_id, msg_id, f"🔍 Subtitles dhoondh raha hoon...\nFile id :- `{task_id}`")
                  proc = subprocess.run(['ffprobe', '-v', 'error', '-select_streams', 's', '-show_entries', 'stream=index,codec_name,tags', '-of', 'json', v_path], capture_output=True, text=True)
                  try:
                      data = json.loads(proc.stdout)
                      streams = data.get('streams', [])
                  except: streams = []
                  
                  if not streams:
                      if msg_id: await app.edit_message_text(chat_id, msg_id, f"❌ Koi subtitle track nahi mila: **{out_name}**")
                      await app.stop()
                      return
                  
                  ext_map = {'subrip': 'srt', 'ass': 'ass', 'webvtt': 'vtt'}
                  for s in streams:
                      idx = s.get('index')
                      codec = s.get('codec_name', 'srt')
                      tags = s.get('tags') or {}
                      lang = tags.get('language', f'trk{idx}')
                      ext = ext_map.get(codec, 'mkv')
                      
                      sub_out = f"sub_{idx}_{lang}.{ext}"
                      subprocess.run(['ffmpeg', '-y', '-i', v_path, '-map', f"0:{idx}", '-c', 'copy', sub_out], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                      if os.path.exists(sub_out):
                          for attempt in range(3):
                              try:
                                  await app.send_document(chat_id, sub_out, caption=f"✅ Extracted Subtitle\n🎬 `{out_name}`\n🏷️ Track: {idx} | Lang: {lang}")
                                  break
                              except Exception: await asyncio.sleep(5)
                  
                  if msg_id: 
                      try: await app.delete_messages(chat_id, msg_id)
                      except: pass
                  await app.stop()
                  return

              s_path = None
              if s_id:
                  s_msg = await app.get_messages(chat_id, int(s_id))
                  ext = ".srt"
                  if getattr(s_msg.document, "file_name", ""):
                      if s_msg.document.file_name.endswith(".ass"): ext = ".ass"
                      elif s_msg.document.file_name.endswith(".vtt"): ext = ".vtt"
                  orig_s_path = await app.download_media(s_msg, file_name=f"sub{ext}", progress=make_prog(app, chat_id, msg_id, "Downloading", out_name, mode, task_id) if msg_id else None)
                  s_path = await prep_subtitle(orig_s_path, settings.get("font", "Arial"))
              
              vf = []
              res = settings.get("res", "Original")
              if res == "Original": res = settings.get("cpu_res", "original")
              if res.lower() != "original":
                  rmap = {"1080p":"1920:1080", "720p":"1280:720", "480p":"854:480", "360p":"640:360", "240p":"426:240", "144p":"256:144"}
                  vf.append(f"scale={rmap.get(res.lower(), res)}")
              
              if s_path:
                  esc_sub = s_path.replace("\\", "/").replace("'", r"'''").replace(":", r"\:")
                  fonts_dir = os.path.abspath("fonts").replace("\\", "/").replace(":", r"\:") if font_file_id else ""
                  font_arg = f":fontsdir='{fonts_dir}'" if fonts_dir else ""
                  vf.append(f"subtitles='{esc_sub}'{font_arg}")
              
              cmd = ['ffmpeg', '-y', '-i', v_path]
              if vf: cmd += ['-vf', ",".join(vf)]
              
              if mode == 'customcmd' and settings.get('custom_args'):
                  import shlex
                  cmd += shlex.split(settings['custom_args'])
                  if '-c:a' not in settings['custom_args']:
                      cmd += ['-c:a', 'copy']
                  cmd += [out_name]
              else:
                  crf = str(settings.get("quality", "23"))
                  preset = settings.get("preset", "fast")
                  cmd += ['-map', '0:v:0', '-map', '0:a:0?', '-c:v', 'libx264', '-preset', preset, '-crf', crf, '-c:a', 'copy', out_name]
              
              if msg_id: await app.edit_message_text(chat_id, msg_id, f"File name:- **{out_name}**\nEncoding :- loading 0%\nMode:- {mode}\nFile id :- `{task_id}`")
              res = subprocess.run(cmd, capture_output=True)
              
              if res.returncode != 0 or not os.path.exists(out_name):
                  if msg_id: await app.edit_message_text(chat_id, msg_id, f"❌ **GitHub Encoding Failed!**")
                  await app.stop()
                  return

              for attempt in range(3):
                  try:
                      await app.send_document(chat_id, out_name, caption=f"✅ **{out_name}**", file_name=out_name, progress=make_prog(app, chat_id, msg_id, "Uploading", out_name, mode, task_id) if msg_id else None)
                      break
                  except Exception:
                      await asyncio.sleep(5)

              if msg_id: 
                  try: await app.delete_messages(chat_id, msg_id)
                  except: pass
              await app.stop()

          asyncio.run(main())
          EOF
          python worker.py
